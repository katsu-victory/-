<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>診療ガイドライン新着監視（CSV Viewer）</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
  body { font-family: system-ui, -apple-system, "Segoe UI", "Noto Sans JP", sans-serif; }
  th.sortable { cursor: pointer; }
  .mono { font-family: ui-monospace, Menlo, Consolas, monospace; }

  .badge-new { background:#dc2626; color:white; }
  .badge-old { background:#e5e7eb; color:#374151; }
  .badge-text { background:#2563eb; color:white; }
  .badge-meta { background:#7c3aed; color:white; }
  .badge-pdf  { background:#111827; color:white; }
  .badge-header { background:#6b7280; color:white; }
  .badge-unknown { background:#9ca3af; color:white; }
</style>
</head>

<body class="bg-gray-100 p-6">
<div class="max-w-7xl mx-auto">

<header class="mb-6">
  <h1 class="text-3xl font-black text-blue-900">診療ガイドライン新着監視</h1>
  <p class="text-sm text-gray-600 font-semibold">
    update_report.csv を忠実に表示するビューア（HTML固定）
  </p>
</header>

<section class="bg-white rounded-xl shadow p-4 mb-6 text-sm grid grid-cols-4 gap-4">
  <div>新着 <span id="newCount" class="font-black text-red-600">-</span></div>
  <div>総件数 <span id="totalCount" class="font-black">-</span></div>
  <div>表示中 <span id="shownCount" class="font-black">-</span></div>
  <div class="mono text-xs">CSV更新 <span id="csvUpdated">-</span></div>
</section>

<section class="bg-white rounded-xl shadow p-4 mb-6 flex gap-3 flex-wrap">
  <input id="q" class="border rounded px-3 py-2 w-64" placeholder="検索（タイトル・出版社・URL）">
  <select id="statusFilter" class="border rounded px-3 py-2">
    <option value="">全ステータス</option>
    <option value="★新着">★新着</option>
    <option value="既知">既知</option>
  </select>
  <select id="limit" class="border rounded px-3 py-2">
    <option value="100">100</option>
    <option value="200" selected>200</option>
    <option value="1000000">全件</option>
  </select>
</section>

<section class="bg-white rounded-xl shadow overflow-x-auto">
<table class="min-w-full text-sm">
<thead class="bg-blue-900 text-white">
<tr>
  <th class="px-4 py-3">Status</th>
  <th class="px-4 py-3">出版社</th>
  <th class="px-4 py-3">発刊日</th>
  <th class="px-4 py-3">改訂日</th>
  <th class="px-4 py-3">検知日</th>
  <th class="px-4 py-3">タイトル / URL</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</section>

<footer class="mt-8 text-xs text-gray-400 text-center font-bold">
  HTMLは固定・CSVのみ更新されます
</footer>

</div>

<script>
const CSV_PATH = "update_report.csv";
const state = { rows: [] };

const badgeClass = (lvl) => ({
  text:"badge-text", meta:"badge-meta", pdf:"badge-pdf",
  header:"badge-header", unknown:"badge-unknown"
}[lvl] || "badge-unknown");

function esc(s){return String(s??"").replace(/[&<>"']/g,c=>(
{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]
));}

function parseCSV(text){
  const rows=[]; let r=[],f="",q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(c=='"'){ if(q && text[i+1]=='"'){f+='"';i++;} else q=!q; }
    else if(!q && (c==","||c=="\n")){
      r.push(f); f="";
      if(c=="\n"){ rows.push(r); r=[]; }
    } else f+=c;
  }
  r.push(f); rows.push(r); return rows;
}

async function loadCsv(){
  const res=await fetch(CSV_PATH+"?v="+Date.now(),{cache:"no-store"});
  const txt=await res.text();
  const t=parseCSV(txt);
  const h=t[0];
  state.rows=t.slice(1).map(r=>{
    const o={}; h.forEach((k,i)=>o[k]=r[i]||""); return o;
  });

  document.getElementById("csvUpdated").textContent =
    state.rows[0]?.["CSV更新日時"]||"-";
  apply();
}

function apply(){
  const q=document.getElementById("q").value.toLowerCase();
  const st=document.getElementById("statusFilter").value;
  const lim=+document.getElementById("limit").value;

  let rows=[...state.rows];
  if(st) rows=rows.filter(r=>r["ステータス"]===st);
  if(q) rows=rows.filter(r=>
    (r["正式タイトル"]+r["出版社"]+r["URL"]).toLowerCase().includes(q)
  );

  document.getElementById("totalCount").textContent=state.rows.length;
  document.getElementById("shownCount").textContent=rows.length;
  document.getElementById("newCount").textContent=
    state.rows.filter(r=>r["ステータス"].includes("新着")).length;

  render(rows.slice(0,lim));
}

function render(rows){
  const tb=document.getElementById("tbody"); tb.innerHTML="";
  rows.forEach(r=>{
    tb.insertAdjacentHTML("beforeend",`
<tr class="border-t hover:bg-blue-50">
<td class="px-4 py-2">
  <span class="px-2 py-1 rounded text-xs font-black ${r["ステータス"].includes("新着")?"badge-new":"badge-old"}">
    ${esc(r["ステータス"])}
  </span>
</td>
<td class="px-4 py-2 font-bold">${esc(r["出版社"])}</td>

<td class="px-4 py-2 mono">
  ${esc(r["発刊日"]||"-")}
  <span class="ml-1 px-1 rounded text-[10px] ${badgeClass(r["発刊日_level"])}"
    title="${esc(r["発刊日_evidence"])}">
    ${esc(r["発刊日_level"])}
  </span>
</td>

<td class="px-4 py-2 mono">
  ${esc(r["改訂日"]||"-")}
  <span class="ml-1 px-1 rounded text-[10px] ${badgeClass(r["改訂日_level"])}"
    title="${esc(r["改訂日_evidence"])}">
    ${esc(r["改訂日_level"])}
  </span>
</td>

<td class="px-4 py-2 mono">${esc(r["検知日"])}</td>

<td class="px-4 py-2">
  <a href="${esc(r["URL"])}" target="_blank" class="text-blue-700 font-bold">
    ${esc(r["正式タイトル"])}
  </a>
  <div class="mono text-xs text-gray-400 break-all">${esc(r["URL"])}</div>
</td>
</tr>`);
  });
}

["q","statusFilter","limit"].forEach(id=>{
  document.getElementById(id).addEventListener("input",apply);
});

loadCsv();
</script>
</body>
</html>
